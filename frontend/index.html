<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#16A34A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="FinPlanner">
  <meta name="description" content="AI-powered personal finance planner with budgeting, expense tracking, goals, and financial advisor">

  <!-- iOS Splash Screens -->
  <link rel="apple-touch-startup-image" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)" href="/assets/splash/launch-640x1136.png">
  <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" href="/assets/splash/launch-750x1334.png">
  <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" href="/assets/splash/launch-828x1792.png">
  <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" href="/assets/splash/launch-1125x2436.png">
  <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" href="/assets/splash/launch-1242x2688.png">
  <link rel="apple-touch-startup-image" media="(device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2)" href="/assets/splash/launch-1536x2048.png">
  <link rel="apple-touch-startup-image" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)" href="/assets/splash/launch-2048x2732.png">
  <link rel="apple-touch-startup-image" media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2)" href="/assets/splash/launch-1668x2388.png">

  <link rel="apple-touch-icon" sizes="192x192" href="/assets/icons/icon-192.svg">
  <link rel="icon" type="image/svg+xml" href="/assets/icons/icon-192.svg">
  <link rel="manifest" href="/manifest.json">

  <title>Finance Planner PRO</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="screenContainer"></div>
    <nav id="bottomNav" class="bottom-nav"></nav>
  </div>

  <script src="shared/utils/storage.js"></script>
  <script src="shared/utils/notifications.js"></script>
  <script src="shared/utils/gamification.js"></script>
  <script src="shared/utils/charts.js"></script>
  <script src="shared/components/bottom-nav.js"></script>
  <script src="shared/components/modal-overlay.js"></script>
  <script src="shared/components/toast-notification.js"></script>
  <script src="shared/components/confetti-effect.js"></script>
  <script src="shared/components/xp-bar.js"></script>

  <script src="config.js"></script>
  <script>window.FPScreens={};</script>
  <script src="screens/onboarding.js"></script>
  <script src="screens/home.js"></script>
  <script src="screens/ai-advisor.js"></script>
  <script src="screens/calendar.js"></script>
  <script src="screens/expenses.js"></script>
  <script src="screens/income.js"></script>
  <script src="screens/bills.js"></script>
  <script src="screens/debt-tracker.js"></script>
  <script src="screens/budget.js"></script>
  <script src="screens/shopping-list.js"></script>
  <script src="screens/goals.js"></script>
  <script src="screens/reports.js"></script>
  <script src="screens/profile.js"></script>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/service-worker.js').then(function(reg) {
          console.log('SW registered:', reg.scope);
        }).catch(function(err) {
          console.log('SW registration failed:', err);
        });
      });
    }

    // Handle shortcut navigation from manifest
    var urlParams = new URLSearchParams(window.location.search);
    var screenParam = urlParams.get('screen');
    if (screenParam) {
      window.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() { navigate(screenParam); }, 100);
      });
    }
  </script>
</body>
</html>
